surfin:
  adapter:
    database:
      # Configuration for the framework metadata database (Postgres)
      metadata:
        type: "postgres"
        host: "postgres"
        port: 5432
        database: "main"
        user: "weather"
        password: "weather"
        schema: "public"
        sslmode: "disable"
        # Connection pool settings
        pool:
          max_open_conns: 10
          max_idle_conns: 5
          conn_max_lifetime_minutes: 5

      # Configuration for the application workload database (Postgres)
      workload:
        type: "postgres"
        host: "postgres"
        port: 5432
        database: "main"
        user: "weather"
        password: "weather"
        schema: "public"
        sslmode: "disable"
        # Connection pool settings
        pool:
          max_open_conns: 10
          max_idle_conns: 5
          conn_max_lifetime_minutes: 5

      # Configuration for the application workload database (MySQL)
      mysql:
        type: "mysql"
        host: "mysql"
        port: 3306
        database: "main"
        user: "weather"
        password: "weather"
        schema: "main"
        sslmode: "disable"
        # Connection pool settings
        pool:
          max_open_conns: 10
          max_idle_conns: 5
          conn_max_lifetime_minutes: 5

      # Configuration for the SQLite database (local development/testing)
      sqlite:
        type: "sqlite"
        database: "surfin.db" # File path for the SQLite database.
        pool:
          max_open_conns: 1
          max_idle_conns: 1
          conn_max_lifetime_minutes: 0

    storage:
      local: 
        type: "local"
        base_dir: "/tmp/surfin_batch_data"
      gcs:
        type: "gcs"
        bucket_name: "${GCS_BUCKET_NAME}"
        credentials_file: ""

    webproxy:
      openmeteo-none:
        type: "NONE"
        api_endpoint: "http://wiremock:8080/v1"
      openmeteo-apikey:
        type: "APIKEY"
        key: "test"
        placement: "header"
        key_name: "X-API-Key"
        api_endpoint: "http://wiremock:8080/v1"

    observability:
      otlp_exporter: # Exporter name
        type: "otlp"
        enabled: true # Enable this exporter entirely
        trace: # Enable tracing if the trace section exists
          host: "otel-collector"
          port: 4317
          protocols: "grpc"
          timeout: "5s"
          insecure: true
        metrics: # Enable metrics if the metrics section exists
          host: "otel-collector"
          port: 4317
          protocols: "grpc"
          timeout: "5s"
          insecure: true

  # Batch framework settings
  batch:
    polling_interval_seconds: 3600 # Polling interval for job status (in seconds).
    job_name: "weatherJob"
    # Step-level retry settings (applies to the entire chunk process).
    retry:
      max_attempts: 3
      initial_interval: 1
      max_interval: 10
      factor: 2
      circuit_breaker_threshold: 3
      circuit_breaker_reset_interval: 60
    # Item-level retry settings.
    item_retry:
      max_attempts: 3
      retryable_exceptions: ["io.EOF", "net.OpError"]
    # Item-level skip settings.
    item_skip:
      skip_limit: 5
      skippable_exceptions: ["json.UnmarshalTypeError"]
    chunk_size: 50 # Default chunk size for chunk-oriented steps.

  # System-wide settings.
  system:
    timezone: "Asia/Tokyo"
    logging:
      level: "DEBUG"
      format: "json" # Default log format (e.g., "json", "text").
      
  # Infrastructure settings.
  infrastructure:
    job_repository_db_ref: "metadata" # Database connection name used by the JobRepository.
