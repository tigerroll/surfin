services:
  surfin:
    container_name: surfin
    build: container/development/surfin
    platform: linux/amd64
    ports:
      - "4000:4000"
      - "2345:2345"
    environment:
      TZ: 'Asia/Tokyo'
      GOPROXY: 'https://proxy.golang.org,direct'
      GOSUMDB: 'sum.golang.org'
    env_file:
      - .env
    privileged: true
    tty: true
    stdin_open: true
    restart: always
    volumes:
      - type: bind
        source: ~/.config/gcloud
        target: /root/.config/gcloud
      - type: bind
        source: .
        target: /opt/surfin
    working_dir: /opt/surfin
    networks:
      - surfin-network

  mysql:
    container_name: mysql
    image: "mysql:8.0.28-debian"
    platform: linux/amd64
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: main
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_USER: weather
      MYSQL_PASSWORD: weather
      TZ: 'Asia/Tokyo'
    command: --default-authentication-plugin=mysql_native_password
    restart: always
    networks:
      - surfin-network

  postgres:
    container_name: postgres
    image: "postgres:latest"
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: main
      POSTGRES_USER: weather
      POSTGRES_PASSWORD: weather
      POSTGRES_HOST_AUTH_METHOD: trust
      POSTGRES_SSLMODE: disable
      TZ: 'Asia/Tokyo'
    restart: always
    networks:
      - surfin-network

  wiremock:
    container_name: wiremock
    image: "wiremock/wiremock:latest"
    ports:
      - "8080:8080"
    privileged: true
    volumes:
      - type: bind
        source: container/development/wiremock/mappings
        target: /home/wiremock/mappings
    networks:
      - surfin-network

  otel-collector:
    container_name: otel-collector
    image: "otel/opentelemetry-collector-contrib:latest"
    platform: linux/amd64
    command: ["--config=/etc/otel-collector-config.yaml"]
    ports:
      - "4317:4317" # OTLP gRPC receiver
      - "4318:4318" # OTLP HTTP receiver
      - "8888:8888" # Prometheus receiver (if needed)
    privileged: true
    volumes:
      - type: bind
        source: container/development/otel-collector/config.yaml
        target: /etc/otel-collector-config.yaml
    networks:
      - surfin-network
    restart: always

networks:
  surfin-network:
    driver: bridge
